version: '3.8'

services:
  db:
    image: postgres:15
    container_name: db
    environment:
      POSTGRES_USER: workforce
      POSTGRES_PASSWORD: workforce_pass
      POSTGRES_DB: workforce_acceptance
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Example web service for local runs:
  # web:
  #   build: .
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #   environment:
  #     DATABASE_URL: postgres://workforce:workforce_pass@db:5432/workforce_acceptance
  #   ports:
  #     - "8000:8000"

volumes:
  db_data:
