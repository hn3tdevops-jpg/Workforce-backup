# OpenResty / Nginx site snippet for Workforce
# Drop this into /etc/nginx/sites-available/workforce and symlink to sites-enabled
# Proxies /api/ to the app (prefer unix socket) and everything else to the app as well.

server {
    listen 80;
    server_name example.com;  # change to your host

    # Disable any inherited Basic auth so API endpoints are proxied without OpenResty prompting for credentials
    auth_basic off;

    # ---- API proxied to unix socket (recommended when app runs on same host) ----
    location /api/ {
        # If using a unix socket at /run/workforce.sock, use this upstream form
        proxy_pass http://unix:/run/workforce.sock:;

        # Ensure no Basic auth from higher-level scopes
        auth_basic off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 120s;
    }

    # ---- Fallback: if you prefer TCP (uvicorn on 127.0.0.1:8001) ----
    #location /api/ {
    #    proxy_pass http://127.0.0.1:8001;
    #    proxy_set_header Host $host;
    #    proxy_set_header X-Real-IP $remote_addr;
    #    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #    proxy_set_header X-Forwarded-Proto $scheme;
    #}

    # Proxy other requests (UI) to the app as well
    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
