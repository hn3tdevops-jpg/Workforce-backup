name: Test (SKIP_WORKFORCE_MODELS matrix)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        skip_model: [false, true]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -e .
      - name: Run tests (matrix)
        env:
          SKIP_WORKFORCE_MODELS: ${{ matrix.skip_model }}
        run: |
          pytest -q tests/
