services:
  - type: web
    name: workforce-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash startup.sh
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////opt/render/project/src/workforce.db
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
    disk:
      name: workforce-db
      mountPath: /opt/render/project/src
      sizeGB: 1
