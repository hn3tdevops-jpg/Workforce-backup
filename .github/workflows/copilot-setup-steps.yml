name: Copilot Agent Setup

on:
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq git

      - name: Install GitHub CLI
        run: |
          type -p gh || (
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg |
            sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg &&
            sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg &&
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" |
            sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null &&
            sudo apt update &&
            sudo apt install gh -y
          )

      - name: Verify GitHub CLI
        run: |
          gh --version || true

      - name: Test GitHub API connectivity
        run: |
          echo "Testing GitHub API..."
          curl -I https://api.github.com || true

      - name: Prepare environment variables
        run: |
          echo "REPO=${{ github.repository }}" > $GITHUB_ENV
          echo "OWNER=$(echo ${{ github.repository }} | cut -d'/' -f1)" >> $GITHUB_ENV
          echo "PROJECT=$(echo ${{ github.repository }} | cut -d'/' -f2)" >> $GITHUB_ENV

      - name: Show repo info
        run: |
          echo "Repository: $REPO"
          echo "Owner: $OWNER"
          echo "Project: $PROJECT"

      - name: Install Python tooling (for your FastAPI backend)
        run: |
          python3 -m pip install --upgrade pip
          pip install fastapi uvicorn sqlalchemy asyncpg alembic python-dotenv pydantic

      - name: Setup Copilot working directories
        run: |
          mkdir -p .copilot_exec
          mkdir -p scripts
          mkdir -p logs

      - name: Initialize state file
        run: |
          echo '{"completed_task_ids":[]}' > .copilot_exec/state.json

      - name: Confirm setup
        run: |
          echo "Copilot setup completed successfully."
