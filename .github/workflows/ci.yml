name: CI

# NOTE: This workflow is superseded by backend-ci.yml which sets the correct
# PYTHONPATH and SKIP_WORKFORCE_MODELS environment variables required by
# the canonical backend runtime (D-0006, D-0008). This file is kept for
# reference but the matrix/setup mismatch has been fixed.

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      matrix:
        python-version: ['3.12', '3.13']

    env:
      PYTHONPATH: apps/api
      SKIP_WORKFORCE_MODELS: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry config virtualenvs.create false || true
          poetry install --no-interaction --no-ansi

      - name: Run tests
        run: |
          pytest -q tests

