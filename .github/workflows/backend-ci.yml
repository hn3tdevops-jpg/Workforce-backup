name: Backend CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      PYTHONPATH: apps/api
      SKIP_WORKFORCE_MODELS: "1"
      DATABASE_URL: "sqlite+aiosqlite:///./workforce_ci.db"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry config virtualenvs.create false
          poetry install --no-interaction --no-ansi

      - name: Run Alembic migration chain (SQLite)
        run: |
          alembic upgrade head
          alembic check || echo "WARNING: alembic check failed — DB may not be at head"

      - name: Run backend tests
        run: |
          pytest -q tests
