<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Developer Console — Workforce</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: "Fira Code", "Cascadia Code", "Consolas", monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Login overlay ── */
    #login-overlay {
      position: fixed; inset: 0;
      background: #0d1117;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .login-box {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 36px 40px;
      width: 360px;
    }

    .login-box h2 {
      color: #58a6ff;
      font-size: 18px;
      margin-bottom: 6px;
    }

    .login-box p {
      color: #8b949e;
      font-size: 12px;
      margin-bottom: 24px;
    }

    .field { margin-bottom: 16px; }

    .field label {
      display: block;
      font-size: 12px;
      color: #8b949e;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .field input {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-family: inherit;
      font-size: 13px;
      padding: 8px 12px;
      outline: none;
      transition: border-color 0.15s;
    }

    .field input:focus { border-color: #58a6ff; }

    .login-btn {
      width: 100%;
      background: #1f6feb;
      border: none;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      padding: 10px;
      margin-top: 4px;
      transition: background 0.15s;
    }

    .login-btn:hover { background: #388bfd; }

    #login-error {
      color: #f85149;
      font-size: 12px;
      margin-top: 12px;
      min-height: 16px;
    }

    /* ── Main console ── */
    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 { font-size: 15px; color: #58a6ff; letter-spacing: 0.05em; }

    .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 12px;
      background: #1f6feb33;
      border: 1px solid #1f6feb;
      color: #58a6ff;
    }

    #user-info { font-size: 12px; color: #8b949e; }

    .mode-toggle { margin-left: auto; display: flex; gap: 8px; }

    .mode-btn {
      background: #21262d;
      border: 1px solid #30363d;
      color: #8b949e;
      padding: 4px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
      transition: all 0.15s;
    }

    .mode-btn.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }

    .logout-btn {
      background: transparent;
      border: 1px solid #30363d;
      color: #8b949e;
      padding: 4px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
    }

    .logout-btn:hover { border-color: #f85149; color: #f85149; }

    .main { display: flex; flex: 1; overflow: hidden; }

    .editor-pane {
      display: flex;
      flex-direction: column;
      width: 50%;
      border-right: 1px solid #30363d;
    }

    .pane-label {
      font-size: 11px;
      color: #8b949e;
      padding: 6px 14px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    #code-input {
      flex: 1;
      background: #0d1117;
      color: #c9d1d9;
      border: none;
      outline: none;
      resize: none;
      padding: 16px;
      font-size: 14px;
      font-family: inherit;
      line-height: 1.6;
      tab-size: 4;
    }

    .toolbar {
      background: #161b22;
      border-top: 1px solid #30363d;
      padding: 8px 14px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .run-btn {
      background: #238636;
      border: 1px solid #2ea043;
      color: #fff;
      padding: 6px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      font-weight: 600;
      transition: background 0.15s;
    }

    .run-btn:hover { background: #2ea043; }

    .clear-btn {
      background: transparent;
      border: 1px solid #30363d;
      color: #8b949e;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
    }

    .clear-btn:hover { border-color: #8b949e; color: #c9d1d9; }

    .hint { font-size: 11px; color: #484f58; margin-left: auto; }

    .spinner {
      display: none;
      width: 14px; height: 14px;
      border: 2px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .output-pane { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

    #output {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      font-size: 13px;
      line-height: 1.6;
    }

    .entry { margin-bottom: 16px; border-left: 3px solid #30363d; padding-left: 12px; }
    .entry-cmd { color: #58a6ff; margin-bottom: 4px; white-space: pre-wrap; word-break: break-all; }
    .entry-cmd::before { content: "▶ "; opacity: 0.5; }
    .entry-out { color: #c9d1d9; white-space: pre-wrap; word-break: break-all; }
    .entry-err { color: #f85149; white-space: pre-wrap; word-break: break-all; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0d1117; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
  </style>
</head>
<body>

<!-- Login overlay (shown when no token) -->
<div id="login-overlay">
  <div class="login-box">
    <h2>⚡ Developer Console</h2>
    <p>Superadmin access required</p>
    <div class="field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="admin@example.com" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" />
    </div>
    <button class="login-btn" onclick="doLogin()">Sign in</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- Console UI (hidden until authenticated) -->
<header>
  <h1>⚡ Developer Console</h1>
  <span class="badge">superadmin</span>
  <span id="user-info"></span>
  <div class="mode-toggle">
    <button class="mode-btn active" id="btn-python" onclick="setMode('python')">Python</button>
    <button class="mode-btn" id="btn-shell" onclick="setMode('shell')">Shell</button>
  </div>
  <a href="/console/copilot" style="background:#21262d;border:1px solid #30363d;color:#8b949e;padding:4px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit;text-decoration:none;transition:all 0.15s;" onmouseover="this.style.borderColor='#58a6ff';this.style.color='#58a6ff'" onmouseout="this.style.borderColor='#30363d';this.style.color='#8b949e'">🤖 Copilot</a>
  <button class="logout-btn" onclick="doLogout()">Logout</button>
</header>

<div class="main">
  <div class="editor-pane">
    <div class="pane-label">Input</div>
    <textarea id="code-input" placeholder="Enter Python code or shell commands…" spellcheck="false"></textarea>
    <div class="toolbar">
      <button class="run-btn" onclick="runCode()">▶ Run</button>
      <button class="clear-btn" onclick="clearOutput()">Clear Output</button>
      <button class="clear-btn" onclick="resetSession()" title="Clears server-side namespace">Reset Session</button>
      <div class="spinner" id="spinner"></div>
      <span class="hint">Ctrl+Enter to run</span>
    </div>
  </div>

  <div class="output-pane">
    <div class="pane-label">Output</div>
    <div id="output"></div>
  </div>
</div>

<script>
  let accessToken = null;
  let currentMode = "python";

  // ── Init ──────────────────────────────────────────────────────────────────
  (function init() {
    const stored = sessionStorage.getItem("console_token");
    const email  = sessionStorage.getItem("console_email");
    if (stored) {
      accessToken = stored;
      showConsole(email);
    }
  })();

  // ── Login ─────────────────────────────────────────────────────────────────
  document.getElementById("login-password").addEventListener("keydown", e => {
    if (e.key === "Enter") doLogin();
  });

  async function doLogin() {
    const email    = document.getElementById("login-email").value.trim();
    const password = document.getElementById("login-password").value;
    document.getElementById("login-error").textContent = "";

    try {
      const resp = await fetch("/api/v1/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password }),
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err.detail || "Login failed");
      }
      const data = await resp.json();
      accessToken = data.access_token;
      sessionStorage.setItem("console_token", accessToken);
      sessionStorage.setItem("console_email", email);
      showConsole(email);
    } catch (e) {
      document.getElementById("login-error").textContent = e.message;
    }
  }

  function showConsole(email) {
    document.getElementById("login-overlay").style.display = "none";
    document.getElementById("user-info").textContent = email || "";
    document.getElementById("code-input").focus();
  }

  function doLogout() {
    sessionStorage.removeItem("console_token");
    sessionStorage.removeItem("console_email");
    accessToken = null;
    document.getElementById("login-overlay").style.display = "flex";
    document.getElementById("login-password").value = "";
  }

  // ── Console ───────────────────────────────────────────────────────────────
  function setMode(mode) {
    currentMode = mode;
    document.getElementById("btn-python").classList.toggle("active", mode === "python");
    document.getElementById("btn-shell").classList.toggle("active",  mode === "shell");
    document.getElementById("code-input").placeholder =
      mode === "python" ? "Enter Python code…" : "Enter shell command…";
  }

  document.getElementById("code-input").addEventListener("keydown", function(e) {
    if (e.ctrlKey && e.key === "Enter") { e.preventDefault(); runCode(); }
    if (e.key === "Tab") {
      e.preventDefault();
      const s = this.selectionStart, end = this.selectionEnd;
      this.value = this.value.substring(0, s) + "    " + this.value.substring(end);
      this.selectionStart = this.selectionEnd = s + 4;
    }
  });

  async function runCode() {
    const code = document.getElementById("code-input").value.trim();
    if (!code || !accessToken) return;

    const spinner = document.getElementById("spinner");
    spinner.style.display = "inline-block";

    try {
      const resp = await fetch("/console/execute", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + accessToken,
        },
        body: JSON.stringify({ code, mode: currentMode }),
      });

      if (resp.status === 401 || resp.status === 403) {
        doLogout();
        return;
      }

      const data = await resp.json();
      appendOutput(code, data.output, data.error);
    } catch (err) {
      appendOutput(code, "", String(err));
    } finally {
      spinner.style.display = "none";
    }
  }

  function appendOutput(cmd, out, err) {
    const div = document.createElement("div");
    div.className = "entry";

    const cmdEl = document.createElement("div");
    cmdEl.className = "entry-cmd";
    cmdEl.textContent = cmd.length > 120 ? cmd.slice(0, 120) + "…" : cmd;
    div.appendChild(cmdEl);

    if (out) {
      const el = document.createElement("div");
      el.className = "entry-out";
      el.textContent = out;
      div.appendChild(el);
    }
    if (err) {
      const el = document.createElement("div");
      el.className = "entry-err";
      el.textContent = err;
      div.appendChild(el);
    }
    if (!out && !err) {
      const el = document.createElement("div");
      el.className = "entry-out";
      el.style.color = "#3fb950";
      el.textContent = "(no output)";
      div.appendChild(el);
    }

    const output = document.getElementById("output");
    output.appendChild(div);
    output.scrollTop = output.scrollHeight;
  }

  function clearOutput() {
    document.getElementById("output").innerHTML = "";
  }

  async function resetSession() {
    if (!accessToken) return;
    try {
      await fetch("/console/reset", {
        method: "POST",
        headers: { "Authorization": "Bearer " + accessToken },
      });
      appendOutput("(reset session)", "Server namespace cleared.", "");
    } catch (err) {
      appendOutput("(reset session)", "", String(err));
    }
  }
</script>
</body>
</html>
